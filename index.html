<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENGO 551 – Lab 5 | IoT Geo Tracker</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #0d1117;
            --surface:   #161b22;
            --border:    #30363d;
            --accent:    #58a6ff;
            --accent2:   #3fb950;
            --danger:    #f85149;
            --warn:      #d29922;
            --text:      #e6edf3;
            --muted:     #8b949e;
            --radius:    6px;
            --mono:      'Space Mono', monospace;
            --sans:      'DM Sans', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top bar ── */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        header h1 {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 0.04em;
        }
        #conn-status {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #conn-status .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.3s;
        }
        #conn-status.connected .dot    { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
        #conn-status.disconnected .dot { background: var(--danger); }

        /* ── Main layout ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .section-title {
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
            font-family: var(--mono);
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 8px 10px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 10px;
        }
        input:focus { border-color: var(--accent); }
        input:disabled { opacity: 0.4; cursor: not-allowed; }

        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }

        button {
            width: 100%;
            padding: 9px 14px;
            border: none;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-primary   { background: var(--accent);  color: #0d1117; }
        .btn-danger    { background: var(--danger);  color: #fff; }
        .btn-success   { background: var(--accent2); color: #0d1117; }
        .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }

        /* ── Log ── */
        #log {
            flex: 1;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            padding: 12px 16px;
            overflow-y: auto;
            line-height: 1.7;
            word-break: break-all;
            min-height: 120px;
        }
        #log .entry { margin-bottom: 2px; }
        #log .entry.info  { color: var(--accent); }
        #log .entry.ok    { color: var(--accent2); }
        #log .entry.error { color: var(--danger); }
        #log .entry.warn  { color: var(--warn); }
        #log .entry.msg   { color: var(--text); }
        #log .ts { color: #444d56; margin-right: 6px; }

        /* ── Map ── */
        #map { flex: 1; }

        /* Leaflet popup dark theme */
        .leaflet-popup-content-wrapper {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .leaflet-popup-tip { background: var(--surface); }
        .popup-temp { font-size: 22px; font-weight: 700; margin: 6px 0; }
        .popup-temp.blue  { color: #58a6ff; }
        .popup-temp.green { color: #3fb950; }
        .popup-temp.red   { color: #f85149; }
        .popup-label { color: var(--muted); font-size: 11px; }
    </style>
</head>
<body>

<header>
    <h1>⬡ ENGO551 · Lab 5 · IoT Geo Tracker</h1>
    <div id="conn-status">
        <span class="dot"></span>
        <span id="conn-label">Disconnected</span>
    </div>
</header>

<div class="main">
    <div class="sidebar">

        <!-- 01 Broker settings -->
        <div class="section">
            <div class="section-title">01 · Broker</div>
            <label>Host</label>
            <input type="text" id="broker-host" value="test.mosquitto.org" />
            <div class="row">
                <div>
                    <label>Port (WebSocket)</label>
                    <input type="number" id="broker-port" value="8080" />
                </div>
            </div>
            <button id="connect-btn" class="btn-primary">▶ Start Connection</button>
            <button id="disconnect-btn" class="btn-danger" disabled>■ End Connection</button>
        </div>

        <!-- 02 Publish any message -->
        <div class="section">
            <div class="section-title">02 · Publish Message</div>
            <label>Topic</label>
            <input type="text" id="pub-topic" placeholder="ENGO551/YourName/my_temperature" />
            <label>Message</label>
            <input type="text" id="pub-message" placeholder='{"hello":"world"}' />
            <button id="publish-btn" class="btn-secondary" disabled>↑ Publish</button>
        </div>

        <!-- 03 Share status -->
        <div class="section">
            <div class="section-title">03 · Share My Status</div>
            <label>Your Name (used in topic)</label>
            <input type="text" id="user-name" value="Student" />
            <button id="share-btn" class="btn-success" disabled>📍 Share My Location + Temp</button>
            <div id="status-topic-display" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;"></div>
        </div>

        <!-- 04 Subscribe -->
        <div class="section">
            <div class="section-title">04 · Subscribe to Topic</div>
            <label>Topic</label>
            <input type="text" id="sub-topic" value="ENGO551/Student/my_temperature" />
            <button id="subscribe-btn" class="btn-secondary" disabled>↓ Subscribe</button>
        </div>

        <!-- 05 Log -->
        <div class="section-title" style="padding: 12px 16px 4px; flex-shrink:0;">05 · Activity Log</div>
        <div id="log"></div>

    </div>

    <div id="map"></div>
</div>

<!-- Paho MQTT over WebSockets -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ─────────────────────────────────────────────
// Map
// ─────────────────────────────────────────────
const map = L.map("map").setView([51.0447, -114.0719], 12);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 19
}).addTo(map);

let currentMarker = null;

function tempColorClass(temp) {
    if (temp < 10)  return "blue";
    if (temp < 30)  return "green";
    return "red";
}

function tempColorHex(temp) {
    if (temp < 10)  return "#58a6ff";
    if (temp < 30)  return "#3fb950";
    return "#f85149";
}

function makeIcon(temp) {
    const color = tempColorHex(temp);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
        <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z"
              fill="${color}" stroke="#0d1117" stroke-width="2"/>
        <circle cx="14" cy="14" r="6" fill="#0d1117" opacity="0.55"/>
    </svg>`;
    return L.divIcon({
        html: svg,
        className: "",
        iconSize: [28, 36],
        iconAnchor: [14, 36],
        popupAnchor: [0, -38]
    });
}

function placeMarker(lat, lng, temp) {
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker([lat, lng], { icon: makeIcon(temp) }).addTo(map);

    const cls = tempColorClass(temp);
    currentMarker.bindPopup(`
        <div class="popup-label">Current Location</div>
        <div class="popup-temp ${cls}">${temp.toFixed(1)}°C</div>
        <div class="popup-label">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
    `).openPopup();

    map.setView([lat, lng], map.getZoom());
}

// ─────────────────────────────────────────────
// Log helper
// ─────────────────────────────────────────────
function log(msg, type = "info") {
    const el = document.getElementById("log");
    const ts = new Date().toLocaleTimeString();
    el.innerHTML += `<div class="entry ${type}"><span class="ts">[${ts}]</span>${msg}</div>`;
    el.scrollTop = el.scrollHeight;
}

// ─────────────────────────────────────────────
// UI elements
// ─────────────────────────────────────────────
const connStatus    = document.getElementById("conn-status");
const connLabel     = document.getElementById("conn-label");
const connectBtn    = document.getElementById("connect-btn");
const disconnectBtn = document.getElementById("disconnect-btn");
const publishBtn    = document.getElementById("publish-btn");
const shareBtn      = document.getElementById("share-btn");
const subscribeBtn  = document.getElementById("subscribe-btn");
const brokerHost    = document.getElementById("broker-host");
const brokerPort    = document.getElementById("broker-port");
const userName      = document.getElementById("user-name");
const statusTopicDisplay = document.getElementById("status-topic-display");

function getStatusTopic() {
    const name = userName.value.trim().replace(/\s+/g, "_") || "Student";
    return `ENGO551/${name}/my_temperature`;
}

// Update topic preview live
userName.addEventListener("input", () => {
    statusTopicDisplay.textContent = "Topic: " + getStatusTopic();
});
statusTopicDisplay.textContent = "Topic: " + getStatusTopic();

function setConnectedUI(connected) {
    connStatus.className = connected ? "connected" : "disconnected";
    connLabel.textContent = connected ? "Connected" : "Disconnected";
    connectBtn.disabled    = connected;
    disconnectBtn.disabled = !connected;
    publishBtn.disabled    = !connected;
    shareBtn.disabled      = !connected;
    subscribeBtn.disabled  = !connected;
    brokerHost.disabled    = connected;
    brokerPort.disabled    = connected;
}

// ─────────────────────────────────────────────
// MQTT
// ─────────────────────────────────────────────
let client = null;
let reconnectTimer = null;
let intentionalDisconnect = false;

function connect() {
    const host = brokerHost.value.trim();
    const port = parseInt(brokerPort.value.trim(), 10);

    if (!host || !port) { log("Host and port are required.", "error"); return; }

    intentionalDisconnect = false;
    clearTimeout(reconnectTimer);

    const clientId = "ENGO551_" + Math.random().toString(16).slice(2, 10);
    client = new Paho.MQTT.Client(host, port, clientId);

    client.onConnectionLost = (resp) => {
        setConnectedUI(false);
        if (intentionalDisconnect) {
            log("Disconnected by user.", "warn");
            return;
        }
        log(`Connection lost: ${resp.errorMessage}. Reconnecting in 5s…`, "error");
        reconnectTimer = setTimeout(connect, 5000);
    };

    client.onMessageArrived = (msg) => {
        log(`↓ [${msg.destinationName}] ${msg.payloadString}`, "msg");
        try {
            const geojson = JSON.parse(msg.payloadString);
            const coords  = geojson?.geometry?.coordinates;
            const temp    = geojson?.properties?.temperature;
            if (Array.isArray(coords) && coords.length >= 2 && typeof temp === "number") {
                placeMarker(coords[1], coords[0], temp);
            }
        } catch (_) { /* not a GeoJSON — that's fine */ }
    };

    log(`Connecting to ${host}:${port}…`);

    client.connect({
        onSuccess: () => {
            log(`Connected to ${host}:${port}`, "ok");
            setConnectedUI(true);

            // Auto-subscribe to your status topic
            const topic = getStatusTopic();
            client.subscribe(topic);
            log(`Auto-subscribed to ${topic}`, "ok");
        },
        onFailure: (err) => {
            log(`Connection failed: ${err.errorMessage}`, "error");
            setConnectedUI(false);
            if (!intentionalDisconnect) {
                log("Retrying in 5s…", "warn");
                reconnectTimer = setTimeout(connect, 5000);
            }
        },
        useSSL: false
    });
}

connectBtn.addEventListener("click", connect);

disconnectBtn.addEventListener("click", () => {
    intentionalDisconnect = true;
    clearTimeout(reconnectTimer);
    if (client && client.isConnected()) client.disconnect();
    setConnectedUI(false);
    log("Disconnected.", "warn");
});

// ─────────────────────────────────────────────
// Publish arbitrary message
// ─────────────────────────────────────────────
publishBtn.addEventListener("click", () => {
    const topic = document.getElementById("pub-topic").value.trim();
    const msg   = document.getElementById("pub-message").value.trim();
    if (!topic || !msg) { log("Topic and message cannot be empty.", "error"); return; }
    if (!client || !client.isConnected()) { log("Not connected.", "error"); return; }

    const message = new Paho.MQTT.Message(msg);
    message.destinationName = topic;
    client.send(message);
    log(`↑ [${topic}] ${msg}`, "ok");
});

// ─────────────────────────────────────────────
// Subscribe button
// ─────────────────────────────────────────────
subscribeBtn.addEventListener("click", () => {
    const topic = document.getElementById("sub-topic").value.trim();
    if (!topic) { log("Subscribe topic cannot be empty.", "error"); return; }
    if (!client || !client.isConnected()) { log("Not connected.", "error"); return; }
    client.subscribe(topic);
    log(`Subscribed to ${topic}`, "ok");
});

// ─────────────────────────────────────────────
// Share My Status — GeoJSON + random temperature
// ─────────────────────────────────────────────
shareBtn.addEventListener("click", () => {
    if (!navigator.geolocation) {
        log("Geolocation is not supported by this browser.", "error");
        return;
    }
    if (!client || !client.isConnected()) { log("Not connected.", "error"); return; }

    log("Requesting GPS location…");
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const lat  = pos.coords.latitude;
            const lng  = pos.coords.longitude;
            // Random temperature in range [-40, 60)
            const temp = parseFloat((Math.random() * 100 - 40).toFixed(1));

            const geojson = {
                type: "Feature",
                geometry: { type: "Point", coordinates: [lng, lat] },
                properties: {
                    temperature: temp,
                    timestamp: new Date().toISOString()
                }
            };

            const topic   = getStatusTopic();
            const payload = JSON.stringify(geojson);
            const message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            client.send(message);

            log(`↑ Status published on [${topic}] — ${lat.toFixed(5)}, ${lng.toFixed(5)} — ${temp}°C`, "ok");
        },
        (err) => {
            log(`Geolocation error (${err.code}): ${err.message}`, "error");
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
});
</script>
</body>
</html>
