<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENGO 551 – Lab 5 | IoT Geo Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --accent: #58a6ff; --accent2: #3fb950; --danger: #f85149;
            --warn: #d29922; --text: #e6edf3; --muted: #8b949e;
            --radius: 6px; --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
            --panel-w: 300px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
        header h1 { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: .04em; white-space: nowrap; }
        #conn-status { margin-left: auto; font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #21262d; border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        #conn-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; }
        #conn-status.connected .dot { background: var(--accent2); box-shadow: 0 0 5px var(--accent2); }
        #conn-status.disconnected .dot { background: var(--danger); }

        /* ── Desktop layout ── */
        .main { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; min-width: 0; }

        /* ── Desktop sidebar ── */
        .sidebar {
            width: var(--panel-w); min-width: 200px; max-width: 80vw;
            background: var(--surface); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
            flex-shrink: 0; position: relative; transition: width .2s;
        }
        .sidebar.collapsed { width: 0 !important; border-left: none; }

        /* drag handle */
        .resize-handle {
            position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
            cursor: col-resize; z-index: 20;
            background: transparent;
        }
        .resize-handle:hover, .resize-handle.dragging { background: var(--accent); opacity: .5; }

        .sidebar-inner { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 200px; }

        #panel-toggle {
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); font-family: var(--mono); font-size: 11px;
            padding: 4px 9px; border-radius: var(--radius); cursor: pointer;
            white-space: nowrap; width: auto; margin: 0; flex-shrink: 0;
        }
        #panel-toggle:hover { border-color: var(--accent); color: var(--accent); }

        /* sections */
        .section { padding: 14px; border-bottom: 1px solid var(--border); }
        .section-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; font-family: var(--mono); }
        input[type="text"], input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 9px; outline: none; transition: border-color .2s; margin-bottom: 8px; }
        input:focus { border-color: var(--accent); }
        input:disabled { opacity: .4; cursor: not-allowed; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        button { width: 100%; padding: 8px 12px; border: none; border-radius: var(--radius); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: opacity .2s, transform .1s; margin-top: 3px; }
        button:active { transform: scale(.98); }
        button:disabled { opacity: .35; cursor: not-allowed; }
        .btn-primary   { background: var(--accent);  color: #0d1117; }
        .btn-danger    { background: var(--danger);  color: #fff; }
        .btn-success   { background: var(--accent2); color: #0d1117; }
        .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }

        #log { flex: 1; font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 10px 14px; overflow-y: auto; line-height: 1.7; word-break: break-all; min-height: 80px; }
        #log .entry { margin-bottom: 1px; }
        #log .entry.info  { color: var(--accent); }
        #log .entry.ok    { color: var(--accent2); }
        #log .entry.error { color: var(--danger); }
        #log .entry.warn  { color: var(--warn); }
        #log .entry.msg   { color: var(--text); }
        #log .ts { color: #444d56; margin-right: 5px; }

        /* Leaflet popup */
        .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.6); }
        .leaflet-popup-tip { background: var(--surface); }
        .popup-temp { font-size: 22px; font-weight: 700; margin: 5px 0; }
        .popup-temp.blue  { color: #58a6ff; }
        .popup-temp.green { color: #3fb950; }
        .popup-temp.red   { color: #f85149; }
        .popup-label { color: var(--muted); font-size: 10px; }

        /* ── Mobile: bottom drawer ── */
        @media (max-width: 640px) {
            .main { flex-direction: column; }
            #map { flex: 1; width: 100%; }

            .sidebar {
                width: 100% !important; max-width: 100%; min-width: unset;
                border-left: none; border-top: 1px solid var(--border);
                height: var(--drawer-h, 48px);
                flex-shrink: 0;
                transition: height .25s ease;
                overflow: hidden;
            }
            .sidebar.collapsed { width: 100% !important; height: 48px !important; }

            .resize-handle { display: none; }

            /* horizontal drag bar at top of drawer */
            .drawer-bar {
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 14px; height: 48px; flex-shrink: 0;
                cursor: pointer; user-select: none; touch-action: none;
                border-bottom: 1px solid var(--border);
            }
            .drawer-bar .drag-pill { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }
            .drawer-bar .drawer-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
            .sidebar-inner { overflow-y: auto; }

            #panel-toggle { display: none !important; }
        }
        @media (min-width: 641px) {
            .drawer-bar { display: none; }
        }
    </style>
</head>
<body>

<header>
    <h1>⬡ ENGO551 · Lab 5 · IoT Geo Tracker</h1>
    <button id="panel-toggle" title="Toggle panel">&#9776; Panel</button>
    <div id="conn-status">
        <span class="dot"></span>
        <span id="conn-label">Disconnected</span>
    </div>
</header>

<div class="main">
    <div id="map"></div>

    <div class="sidebar" id="sidebar">
        <!-- mobile drag bar -->
        <div class="drawer-bar" id="drawer-bar">
            <span class="drawer-label" id="drawer-label">Controls</span>
            <div class="drag-pill"></div>
            <span id="drawer-chevron" style="font-size:14px;color:var(--muted);">&#8964;</span>
        </div>

        <!-- desktop resize handle -->
        <div class="resize-handle" id="resize-handle"></div>

        <div class="sidebar-inner">
            <div class="section">
                <div class="section-title">01 · Broker</div>
                <label>Host</label>
                <input type="text" id="broker-host" value="test.mosquitto.org" />
                <div class="row">
                    <div><label>Port (WS)</label><input type="number" id="broker-port" value="8080" /></div>
                </div>
                <button id="connect-btn" class="btn-primary">&#9654; Start Connection</button>
                <button id="disconnect-btn" class="btn-danger" disabled>&#9632; End Connection</button>
            </div>

            <div class="section">
                <div class="section-title">02 · Publish Message</div>
                <label>Topic</label>
                <input type="text" id="pub-topic" placeholder="ENGO551/Name/my_temperature" />
                <label>Message</label>
                <input type="text" id="pub-message" placeholder='{"hello":"world"}' />
                <button id="publish-btn" class="btn-secondary" disabled>&#8593; Publish</button>
            </div>

            <div class="section">
                <div class="section-title">03 · Share My Status</div>
                <label>Your Name</label>
                <input type="text" id="user-name" value="Student" />
                <div id="status-topic-display" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px;"></div>
                <button id="share-btn" class="btn-success" disabled>&#128205; Share Location + Temp</button>
            </div>

            <div class="section">
                <div class="section-title">04 · Subscribe</div>
                <label>Topic</label>
                <input type="text" id="sub-topic" value="ENGO551/Student/my_temperature" />
                <button id="subscribe-btn" class="btn-secondary" disabled>&#8595; Subscribe</button>
            </div>

            <div class="section-title" style="padding:10px 14px 4px;flex-shrink:0;">05 · Log</div>
            <div id="log"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// ── Map ──
const map = L.map("map").setView([51.0447, -114.0719], 12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>', subdomains: "abcd", maxZoom: 19
}).addTo(map);
let currentMarker = null;

function tempClass(t) { return t < 10 ? "blue" : t < 30 ? "green" : "red"; }
function tempHex(t)   { return t < 10 ? "#58a6ff" : t < 30 ? "#3fb950" : "#f85149"; }

function makeIcon(temp) {
    const c = tempHex(temp);
    return L.divIcon({
        html: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36"><path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${c}" stroke="#0d1117" stroke-width="2"/><circle cx="14" cy="14" r="6" fill="#0d1117" opacity=".55"/></svg>`,
        className: "", iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-38]
    });
}

function placeMarker(lat, lng, temp) {
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker([lat, lng], { icon: makeIcon(temp) }).addTo(map);
    currentMarker.bindPopup(`<div class="popup-label">Current Location</div><div class="popup-temp ${tempClass(temp)}">${temp.toFixed(1)}°C</div><div class="popup-label">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`).openPopup();
    map.setView([lat, lng], map.getZoom());
}

// ── Log ──
function log(msg, type = "info") {
    const el = document.getElementById("log");
    const ts = new Date().toLocaleTimeString();
    el.innerHTML += `<div class="entry ${type}"><span class="ts">[${ts}]</span>${msg}</div>`;
    el.scrollTop = el.scrollHeight;
}

// ── UI refs ──
const connStatus    = document.getElementById("conn-status");
const connLabel     = document.getElementById("conn-label");
const connectBtn    = document.getElementById("connect-btn");
const disconnectBtn = document.getElementById("disconnect-btn");
const publishBtn    = document.getElementById("publish-btn");
const shareBtn      = document.getElementById("share-btn");
const subscribeBtn  = document.getElementById("subscribe-btn");
const brokerHost    = document.getElementById("broker-host");
const brokerPort    = document.getElementById("broker-port");
const userName      = document.getElementById("user-name");
const statusDisplay = document.getElementById("status-topic-display");

function getStatusTopic() { return `ENGO551/${(userName.value.trim().replace(/\s+/g,"_")||"Student")}/my_temperature`; }
function updateTopicDisplay() { statusDisplay.textContent = "Topic: " + getStatusTopic(); }
userName.addEventListener("input", updateTopicDisplay);
updateTopicDisplay();

function setConnectedUI(connected) {
    connStatus.className = connected ? "connected" : "disconnected";
    connLabel.textContent = connected ? "Connected" : "Disconnected";
    connectBtn.disabled = connected; disconnectBtn.disabled = !connected;
    publishBtn.disabled = !connected; shareBtn.disabled = !connected; subscribeBtn.disabled = !connected;
    brokerHost.disabled = connected; brokerPort.disabled = connected;
}

// ── MQTT ──
let client = null, reconnectTimer = null, intentionalDisconnect = false;

function connect() {
    const host = brokerHost.value.trim(), port = parseInt(brokerPort.value.trim(), 10);
    if (!host || !port) { log("Host and port required.", "error"); return; }
    intentionalDisconnect = false; clearTimeout(reconnectTimer);
    const clientId = "ENGO551_" + Math.random().toString(16).slice(2, 10);
    client = new Paho.MQTT.Client(host, port, clientId);

    client.onConnectionLost = (r) => {
        setConnectedUI(false);
        if (intentionalDisconnect) { log("Disconnected by user.", "warn"); return; }
        log(`Connection lost: ${r.errorMessage}. Reconnecting in 5s…`, "error");
        reconnectTimer = setTimeout(connect, 5000);
    };

    client.onMessageArrived = (msg) => {
        log(`&#8595; [${msg.destinationName}] ${msg.payloadString}`, "msg");
        try {
            const g = JSON.parse(msg.payloadString);
            const c = g?.geometry?.coordinates, t = g?.properties?.temperature;
            if (Array.isArray(c) && c.length >= 2 && typeof t === "number") placeMarker(c[1], c[0], t);
        } catch(_) {}
    };

    log(`Connecting to ${host}:${port}…`);
    client.connect({
        useSSL: false,
        onSuccess: () => {
            log(`Connected to ${host}:${port}`, "ok");
            setConnectedUI(true);
            const topic = getStatusTopic();
            client.subscribe(topic);
            log(`Auto-subscribed to ${topic}`, "ok");
        },
        onFailure: (e) => {
            log(`Failed: ${e.errorMessage}`, "error");
            setConnectedUI(false);
            if (!intentionalDisconnect) { log("Retrying in 5s…", "warn"); reconnectTimer = setTimeout(connect, 5000); }
        }
    });
}

connectBtn.addEventListener("click", connect);
disconnectBtn.addEventListener("click", () => {
    intentionalDisconnect = true; clearTimeout(reconnectTimer);
    if (client && client.isConnected()) client.disconnect();
    setConnectedUI(false); log("Disconnected.", "warn");
});

publishBtn.addEventListener("click", () => {
    const topic = document.getElementById("pub-topic").value.trim();
    const msg   = document.getElementById("pub-message").value.trim();
    if (!topic || !msg) { log("Topic and message required.", "error"); return; }
    if (!client?.isConnected()) { log("Not connected.", "error"); return; }
    const m = new Paho.MQTT.Message(msg); m.destinationName = topic; client.send(m);
    log(`&#8593; [${topic}] ${msg}`, "ok");
});

subscribeBtn.addEventListener("click", () => {
    const topic = document.getElementById("sub-topic").value.trim();
    if (!topic) { log("Topic required.", "error"); return; }
    if (!client?.isConnected()) { log("Not connected.", "error"); return; }
    client.subscribe(topic); log(`Subscribed to ${topic}`, "ok");
});

shareBtn.addEventListener("click", () => {
    if (!navigator.geolocation) { log("Geolocation not supported.", "error"); return; }
    if (!client?.isConnected()) { log("Not connected.", "error"); return; }
    log("Requesting GPS…");
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        const temp = parseFloat((Math.random() * 100 - 40).toFixed(1));
        const payload = JSON.stringify({ type:"Feature", geometry:{ type:"Point", coordinates:[lng,lat] }, properties:{ temperature:temp, timestamp:new Date().toISOString() } });
        const topic = getStatusTopic();
        const m = new Paho.MQTT.Message(payload); m.destinationName = topic; client.send(m);
        log(`&#8593; Status [${topic}] — ${temp}°C`, "ok");
    }, err => log(`GPS error: ${err.message}`, "error"), { enableHighAccuracy:true, timeout:10000, maximumAge:0 });
});

// ── Desktop: resizable sidebar ──
const sidebar = document.getElementById("sidebar");
const handle  = document.getElementById("resize-handle");
const toggle  = document.getElementById("panel-toggle");
let isResizing = false, startX = 0, startW = 0;

handle.addEventListener("mousedown", e => {
    isResizing = true; startX = e.clientX; startW = sidebar.offsetWidth;
    handle.classList.add("dragging"); e.preventDefault();
});
document.addEventListener("mousemove", e => {
    if (!isResizing) return;
    const delta = startX - e.clientX;
    const newW = Math.max(200, Math.min(window.innerWidth * 0.8, startW + delta));
    sidebar.style.width = newW + "px";
    document.documentElement.style.setProperty("--panel-w", newW + "px");
});
document.addEventListener("mouseup", () => { isResizing = false; handle.classList.remove("dragging"); });

toggle.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
    toggle.textContent = sidebar.classList.contains("collapsed") ? "☰ Panel" : "☰ Panel";
});

// ── Mobile: bottom drawer ──
const drawerBar   = document.getElementById("drawer-bar");
const chevron     = document.getElementById("drawer-chevron");
const SNAP_CLOSED = 48, SNAP_OPEN = Math.round(window.innerHeight * 0.55);
let drawerOpen = false, touchStartY = 0, touchStartH = 0, drawerH = SNAP_CLOSED;

function isMobile() { return window.innerWidth <= 640; }

function setDrawerHeight(h, animate) {
    drawerH = h;
    if (animate) sidebar.style.transition = "height .25s ease";
    else         sidebar.style.transition = "none";
    sidebar.style.height = h + "px";
    document.documentElement.style.setProperty("--drawer-h", h + "px");
    chevron.innerHTML = h > SNAP_CLOSED + 20 ? "&#8963;" : "&#8964;";
}

drawerBar.addEventListener("click", () => {
    if (!isMobile()) return;
    drawerOpen = !drawerOpen;
    setDrawerHeight(drawerOpen ? SNAP_OPEN : SNAP_CLOSED, true);
});

drawerBar.addEventListener("touchstart", e => {
    if (!isMobile()) return;
    touchStartY = e.touches[0].clientY;
    touchStartH = sidebar.offsetHeight;
    sidebar.style.transition = "none";
}, { passive: true });

drawerBar.addEventListener("touchmove", e => {
    if (!isMobile()) return;
    const dy = touchStartY - e.touches[0].clientY;
    const newH = Math.max(SNAP_CLOSED, Math.min(window.innerHeight * 0.85, touchStartH + dy));
    setDrawerHeight(newH, false);
}, { passive: true });

drawerBar.addEventListener("touchend", () => {
    if (!isMobile()) return;
    const mid = (SNAP_OPEN + SNAP_CLOSED) / 2;
    drawerOpen = drawerH > mid;
    setDrawerHeight(drawerOpen ? SNAP_OPEN : SNAP_CLOSED, true);
});

// Fix map size after panel resize
const mapResizeObserver = new ResizeObserver(() => map.invalidateSize());
mapResizeObserver.observe(document.getElementById("map"));
</script>
</body>
</html>
